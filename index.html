<!DOCTYPE html>
<html>
<head>
  <title>Kingshot Viking Planner</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    select {
      padding: 10px;
      font-size: 16px;
    }
    .card {
      margin-top: 20px;
      padding: 20px;
      background: #222;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>⚔️ Viking War Dashboard ⚔️</h1>

<select id="playerSelect"></select>

<div id="output" class="card"></div>

<script>

const sheetURL = "data.json";

let data = [];

fetch(sheetURL)
  .then(res => res.json())
  .then(json => {
    data = json.players;

    const select = document.getElementById("playerSelect");

    data.forEach(p => {
      const option = document.createElement("option");
      option.value = p.name;
      option.textContent = p.name;
      select.appendChild(option);
    });

    select.addEventListener("change", showPlayer);

    showPlayer();
  });

function showPlayer() {
  const playerName = document.getElementById("playerSelect").value;

  const player = data.find(p => p.name === playerName);

  let html = `<h2>${player.name} 🛡️</h2>`;

  player.assignments.forEach(a => {
    html += `
      <p>
        <strong>${a.hero}</strong> ➝ ${a.target}
      </p>
    `;
  });

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
